{% extends "base.html" %}
{% block title %}Request Mentorship{% endblock title %}
{% block content %}
<div class="container mx-auto px-4 py-8 max-w-2xl">
  <nav class="text-sm mb-4">
    <a href="{% url 'mentor_list' %}" class="text-blue-600 hover:text-blue-800 dark:text-blue-400">Mentors</a>
    <span class="mx-2 text-gray-400">/</span>
    <a href="{% url 'mentor_profile_view' mentor.id %}" class="text-blue-600 hover:text-blue-800 dark:text-blue-400">{{ mentor.user.get_full_name|default:mentor.user.username }}</a>
    <span class="mx-2 text-gray-400">/</span>
    <span class="text-gray-600 dark:text-gray-400">Request</span>
  </nav>
  <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-6">
    <h1 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Request Mentorship</h1>
    <form method="post" class="space-y-5">
      {% csrf_token %}
      <div>
        <label for="subject" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Subject (optional)</label>
        <select id="subject" name="subject" class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
          <option value="">General mentorship</option>
          {% for s in subjects %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
        </select>
      </div>
      <div>
        <label for="message" class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-1">Message <span class="text-red-500">*</span></label>
        <textarea id="message" name="message" rows="5" required placeholder="Introduce yourself and explain what you're looking to learn..."
          class="w-full px-4 py-2 border border-gray-300 dark:border-gray-600 rounded-lg bg-white dark:bg-gray-700 text-gray-900 dark:text-white text-sm focus:outline-none focus:ring-2 focus:ring-blue-500"></textarea>
      </div>
      <div class="flex items-center space-x-3">
        <button type="submit" class="bg-teal-300 hover:bg-teal-400 dark:bg-teal-600 dark:hover:bg-teal-500 text-white font-semibold px-6 py-2 rounded-lg transition duration-200 focus:outline-none focus:ring-2 focus:ring-teal-300">
          Send Request
        </button>
        <a href="{% url 'mentor_profile_view' mentor.id %}" class="text-gray-500 hover:text-gray-700 dark:text-gray-400 text-sm">Cancel</a>
      </div>
    </form>
  </div>
</div>
{% endblock content %}
