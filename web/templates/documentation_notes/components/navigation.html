<!-- Navigation Component -->
<div class="border-t border-gray-200 dark:border-gray-700 px-6 md:px-8 py-6 bg-gray-50 dark:bg-gray-800/50">
  <div class="grid grid-cols-3 gap-4 items-center">
    <!-- Previous Button -->
    <div>
      {% if previous_section %}
        <a href="{% url 'docs_section_detail' topic.slug previous_section.slug %}"
           class="group inline-flex items-center px-4 py-2 bg-white dark:bg-gray-800 border border-gray-300 dark:border-gray-600 rounded-lg hover:bg-gray-50 dark:hover:bg-gray-700 transition-colors duration-200">
          <svg class="w-5 h-5 mr-2 text-gray-600 dark:text-gray-400 group-hover:text-gray-900 dark:group-hover:text-white"
               fill="none"
               stroke="currentColor"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
          <span class="text-sm font-medium text-gray-700 dark:text-gray-300 group-hover:text-gray-900 dark:group-hover:text-white">
            Previous
          </span>
        </a>
      {% else %}
        <div class="inline-flex items-center px-4 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg opacity-50 cursor-not-allowed">
          <svg class="w-5 h-5 mr-2 text-gray-400"
               fill="none"
               stroke="currentColor"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"></path>
          </svg>
          <span class="text-sm font-medium text-gray-500">Previous</span>
        </div>
      {% endif %}
    </div>
    <!-- Progress Indicator -->
    <div class="text-center">
      <div class="inline-block">
        <p class="text-xs font-semibold text-gray-500 dark:text-gray-400 uppercase tracking-wide">Progress</p>
        <p class="text-lg font-bold text-gray-900 dark:text-white">
          {% if sections.count > 0 %}
            {{ current_section_index }}<span class="text-gray-400 dark:text-gray-500 font-normal">/ {{ sections.count }}</span>
          {% endif %}
        </p>
      </div>
    </div>
    <!-- Next Button -->
    <div class="text-right">
      {% if next_section %}
        <a href="{% url 'docs_section_detail' topic.slug next_section.slug %}"
           class="group inline-flex items-center px-4 py-2 bg-{{ topic.color }}-500 hover:bg-{{ topic.color }}-600 text-white rounded-lg transition-colors duration-200">
          <span class="text-sm font-medium">Next</span>
          <svg class="w-5 h-5 ml-2 group-hover:translate-x-1 transition-transform"
               fill="none"
               stroke="currentColor"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </a>
      {% else %}
        <div class="inline-flex items-center px-4 py-2 bg-gray-100 dark:bg-gray-800 border border-gray-200 dark:border-gray-700 rounded-lg opacity-50 cursor-not-allowed">
          <span class="text-sm font-medium text-gray-500">Next</span>
          <svg class="w-5 h-5 ml-2 text-gray-400"
               fill="none"
               stroke="currentColor"
               viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"></path>
          </svg>
        </div>
      {% endif %}
    </div>
  </div>
</div>
