name: PR Review Reminder

# This workflow ensures PRs reviewed only by CodeRabbit AI are automatically
# brought to maintainers' attention if no human review occurs within a certain time.
#
# NO SETUP REQUIRED - This workflow is ready to use!
# It tracks notifications via comment history, so no labels needed.

on:
  pull_request_review:
    types: [submitted]

  schedule:
    - cron: "0 */6 * * *"

  # Allow manual triggering for testing
  workflow_dispatch:
    inputs:
      hours_threshold:
        description: "Hours to wait before notifying maintainers"
        required: false
        default: "24"
        type: string

env:
  # List of maintainer GitHub usernames (comma-separated)
  MAINTAINERS: "A1L13N"

  # Default time threshold in hours before notifying maintainers
  DEFAULT_HOURS_THRESHOLD: 24

  # CodeRabbit bot username
  CODERABBIT_BOT: "coderabbitai[bot]"

  # Notification identifier (used to detect if we already commented)
  NOTIFICATION_MARKER: "<!-- pr-review-reminder-bot -->"

  # Exempt bot accounts (comma-separated)
  EXEMPT_BOTS: "coderabbitai[bot],github-actions[bot],dependabot[bot],copilot[bot],copilot-swe-agent[bot]"

jobs:
  check-pr-reviews:
    name: Check PR Reviews and Notify Maintainers
    runs-on: ubuntu-latest

    permissions:
      pull-requests: write
      issues: write
      contents: read

    steps:
      - name: Check PR Reviews
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            // Configuration
            const input = '${{ github.event.inputs.hours_threshold }}'.trim();
            const hoursThreshold = parseInt(
              input && input !== 'undefined' && input !== '' ? input : process.env.DEFAULT_HOURS_THRESHOLD,
              10
            );
            const maintainers = process.env.MAINTAINERS.split(',').map(m => m.trim());
            const coderabbitBot = process.env.CODERABBIT_BOT;
            const notificationMarker = process.env.NOTIFICATION_MARKER;
            const exemptBots = new Set(process.env.EXEMPT_BOTS.split(',').map(b => b.trim()));

            console.log(`Configuration:`);
            console.log(`- Hours threshold: ${hoursThreshold}`);
            console.log(`- Maintainers: ${maintainers.join(', ')}`);
            console.log(`- Exempt bots: ${Array.from(exemptBots).join(', ')}`);
            // Helper function to check if PR should be notified
            async function shouldNotifyPR(pr) {
              try {
                // Get all comments to check if we already notified
                const issueComments = await github.rest.issues.listComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  per_page: 100
                });

                // Check if we already posted a notification
                const alreadyNotified = issueComments.data.some(
                  comment => comment.body && comment.body.includes(notificationMarker)
                );

                if (alreadyNotified) {
                  console.log(`PR #${pr.number}: Already notified, skipping`);
                  return false;
                }

                // Check if PR is old enough
                const prAge = Date.now() - new Date(pr.created_at).getTime();
                const prAgeHours = prAge / (1000 * 60 * 60);

                if (prAgeHours < hoursThreshold) {
                  console.log(`PR #${pr.number}: Too recent (${prAgeHours.toFixed(2)} hours old), skipping`);
                  return false;
                }

                // Get all reviews for this PR
                const reviews = await github.rest.pulls.listReviews({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100
                });

                console.log(`PR #${pr.number}: Found ${reviews.data.length} reviews`);

                // Get all comments on the PR (review comments)
                const reviewComments = await github.rest.pulls.listReviewComments({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  pull_number: pr.number,
                  per_page: 100
                });

                // Reuse previously fetched issueComments to avoid duplicate API call
                const allIssueComments = issueComments;

                // Combine all reviewers and commenters
                const allReviewers = new Set();

                // Add review submitters
                reviews.data.forEach(review => {
                  if (review.user && review.user.login) {
                    allReviewers.add(review.user.login);
                  }
                });

                // Add review comment authors
                reviewComments.data.forEach(comment => {
                  if (comment.user && comment.user.login) {
                    allReviewers.add(comment.user.login);
                  }
                });

                // Add issue comment authors (excluding PR author and our bot)
                allIssueComments.data.forEach(comment => {
                  if (comment.user && comment.user.login &&
                      comment.user.login !== pr.user.login &&
                      comment.body && !comment.body.includes(notificationMarker)) {
                    allReviewers.add(comment.user.login);
                  }
                });

                console.log(`PR #${pr.number}: Reviewers/Commenters: ${Array.from(allReviewers).join(', ')}`);

                // Remove all bot accounts from the set
                exemptBots.forEach(bot => allReviewers.delete(bot));

                // Check if there are any human reviewers left
                if (allReviewers.size === 0) {
                  console.log(`PR #${pr.number}: Only bots have reviewed, needs maintainer attention`);
                  return true;
                }

                console.log(`PR #${pr.number}: Has human reviewers, skipping`);
                return false;

              } catch (error) {
                console.error(`Error checking PR #${pr.number}:`, error);
                return false;
              }
            }

            // Helper function to notify maintainers about a PR
            async function notifyMaintainers(pr) {
              try {
                console.log(`Notifying maintainers about PR #${pr.number}`);

                // Create maintainer mentions
                const maintainerMentions = maintainers.map(m => `@${m}`).join(' ');

                // Post a comment tagging maintainers
                // Sanitize PR title to prevent markdown injection
                const sanitizedTitle = pr.title.replace(/[`*_~\[\]()#]/g, '\\$&');
                const commentBody = `${notificationMarker}\n` +
                  `👋 ${maintainerMentions}\n\n` +
                  `This PR has been reviewed by bots but is awaiting human review.\n\n` +
                  `**PR Details:**\n` +
                  `- Created: ${new Date(pr.created_at).toISOString()}\n` +
                  `- Author: @${pr.user.login}\n` +
                  `- Title: ${sanitizedTitle}\n\n` +
                  `Please review this PR when you have a chance. Thank you! 🙏`;

                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: pr.number,
                  body: commentBody
                });

                // Request reviews from maintainers
                // Filter out maintainers who are the PR author
                const reviewersToRequest = maintainers.filter(m => m !== pr.user.login);

                if (reviewersToRequest.length > 0) {
                  try {
                    await github.rest.pulls.requestReviewers({
                      owner: context.repo.owner,
                      repo: context.repo.repo,
                      pull_number: pr.number,
                      reviewers: reviewersToRequest
                    });
                    console.log(`PR #${pr.number}: Requested reviews from ${reviewersToRequest.join(', ')}`);
                  } catch (reviewError) {
                    console.warn(`PR #${pr.number}: Could not request reviews:`, reviewError.message);
                    // This is not critical, the comment with mentions is enough
                  }
                }

                console.log(`PR #${pr.number}: Successfully notified maintainers`);

              } catch (error) {
                console.error(`Error notifying maintainers for PR #${pr.number}:`, error);
              }
            }

            // Main execution
            console.log('Starting PR review check...');

            // Get all open pull requests with pagination
            const pulls = await github.paginate(github.rest.pulls.list, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              per_page: 100
            });

            console.log(`Found ${pulls.length} open PRs`);

            // Track how many PRs we notified about
            let notifiedCount = 0;

            // Check each PR
            for (const pr of pulls) {
              console.log(`\n--- Checking PR #${pr.number}: ${pr.title} ---`);

              const shouldNotify = await shouldNotifyPR(pr);

              if (shouldNotify) {
                await notifyMaintainers(pr);
                notifiedCount++;
              }
            }

            console.log(`\n=== Summary ===`);
            console.log(`Total open PRs: ${pulls.length}`);
            console.log(`PRs notified: ${notifiedCount}`);

            if (notifiedCount > 0) {
              core.notice(`✅ Notified maintainers about ${notifiedCount} PR(s) awaiting human review`);
            } else {
              core.notice(`✅ All PRs have human reviewers or are too recent`);
            }
